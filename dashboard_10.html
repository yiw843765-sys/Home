<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Command Center</title>
    <style>
        /* --- DESIGN AESTHETIC --- */
        :root {
            --bg-color: #f6e6e2;       
            --card-bg: #fcfbf9;        
            --text-main: #4a3e3d;      
            --text-muted: #968685;     
            --accent-tan: #dbbeaf;     
            --accent-line: #eae3df;    
            --border-radius: 24px;     
            --success-green: #6e8b75;
            --success-bg: #eef3ef;
            --highlight-focus: #dca391;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Confetti Canvas Overlay */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 99999;
        }

        .app-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1400px;
        }

        .menu-sidebar {
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(74, 62, 61, 0.05);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: sticky;
            top: 30px;
        }

        .menu-title {
            text-align: center;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .menu-btn {
            background-color: var(--accent-tan);
            color: var(--text-main);
            border: none;
            padding: 14px 20px;
            border-radius: 50px; 
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-btn:hover, .menu-btn.active {
            background-color: var(--text-main);
            color: #ffffff;
            transform: translateY(-1px);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .header-card {
            background: var(--card-bg);
            padding: 25px 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(74, 62, 61, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 0;
            font-weight: 700;
        }

        .header-date {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .content-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(74, 62, 61, 0.05);
            min-height: 500px;
        }

        .card-header-main {
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .card-subtitle {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            border-bottom: 2px solid var(--accent-line);
            padding-bottom: 12px;
        }

        .todo-group {
            margin-bottom: 25px;
        }

        .group-heading {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .group-sub-heading {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--highlight-focus);
            margin: 15px 0 8px 5px;
            font-weight: 600;
        }

        .group-date-range {
            font-size: 0.8rem;
            color: var(--highlight-focus);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: #fff;
            border: 1px solid var(--accent-line);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .todo-item:hover {
            border-color: var(--accent-tan);
            background-color: #fffdfb;
        }

        .todo-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-tan);
            border-radius: 6px;
            margin-right: 15px;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .todo-item input[type="checkbox"]:checked {
            background-color: var(--text-main);
            border-color: var(--text-main);
        }

        .todo-item input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .todo-item input[type="checkbox"]:checked + .todo-content-wrapper .todo-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .todo-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .todo-meta-tag {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--highlight-focus);
            font-weight: 700;
        }

        .todo-text {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* --- STYLISH ROW LAYOUT FOR HISTORY ROOT TRACKS --- */
        .history-row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: #fff;
            border: 1px solid var(--accent-line);
            border-radius: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-row-item:hover {
            border-color: var(--accent-tan);
            background-color: #fffdfb;
            transform: translateX(2px);
        }

        .history-row-left {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .progress-fraction-badge {
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 700;
            background: var(--bg-color);
            padding: 6px 16px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        /* --- POP-UP MODAL ENGINE LAYOUTS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(74, 62, 61, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 35px;
            display: flex;
            flex-direction: column;
            animation: modalFadeIn 0.25s ease forwards;
        }

        @keyframes modalFadeIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-line);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .modal-close-btn {
            background: var(--accent-tan);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: all 0.15s;
        }

        .modal-close-btn:hover {
            background: var(--text-main);
            color: white;
        }

        /* Interval Selector Tabs Inside Popups */
        .interval-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }

        .interval-tab {
            background: #fff;
            border: 1px solid var(--accent-line);
            padding: 12px 10px;
            text-align: center;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .interval-tab:hover {
            border-color: var(--accent-tan);
            background-color: #fffdfb;
        }

        .interval-tab.current-focus {
            background-color: var(--highlight-focus) !important;
            color: white !important;
            border-color: var(--highlight-focus) !important;
            box-shadow: 0 4px 12px rgba(220, 163, 145, 0.3);
        }

        .interval-tab.active-selection {
            border: 2px solid var(--text-main);
            background-color: var(--accent-line);
        }

        .drilldown-history-box {
            flex: 1;
            overflow-y: auto;
            background: #fff;
            border: 1px solid var(--accent-line);
            border-radius: 16px;
            padding: 20px;
            max-height: 320px;
        }

        .history-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border: 1px solid var(--accent-line);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .history-detail-text {
            font-weight: 500;
        }

        .history-detail-time {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* --- CONTEXT MENU --- */
        #task-context-menu {
            position: fixed;
            background: var(--card-bg);
            border: 1px solid var(--accent-line);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(74,62,61,0.15);
            z-index: 99998;
            overflow: hidden;
            display: none;
            min-width: 160px;
        }
        .context-menu-item {
            padding: 12px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.15s;
        }
        .context-menu-item:hover { background: var(--bg-color); }
        .context-menu-item.danger { color: #b85c5c; }

        /* --- NOTE MODAL --- */
        #note-modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(74,62,61,0.35);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #note-modal-overlay.active { display: flex; }
        #note-modal-box {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            animation: modalFadeIn 0.2s ease forwards;
        }
        #note-modal-box h3 {
            margin: 0 0 6px 0;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }
        #note-modal-task-label {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 16px;
            display: block;
        }
        #note-modal-textarea {
            width: 100%;
            min-height: 110px;
            border: 1.5px solid var(--accent-line);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            background: #fff;
            resize: vertical;
            outline: none;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }
        #note-modal-textarea:focus { border-color: var(--accent-tan); }
        .note-modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 16px;
        }
        .note-btn {
            padding: 10px 22px;
            border-radius: 50px;
            border: none;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .note-btn-cancel { background: var(--accent-line); color: var(--text-main); }
        .note-btn-save { background: var(--text-main); color: #fff; }
        .note-btn:hover { opacity: 0.85; }

        /* --- COLLAPSIBLE MENU GROUP --- */
        .menu-group-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-main);
            background: var(--accent-line);
            cursor: pointer;
            margin-bottom: 6px;
            transition: background 0.15s;
            user-select: none;
        }
        .menu-group-toggle:hover { background: var(--accent-tan); color: #fff; }
        .menu-group-toggle.open { background: var(--text-main); color: #fff; }
        .menu-sub-btn {
            margin-left: 12px !important;
            font-size: 0.82rem !important;
            padding: 10px 14px !important;
            border-radius: 10px !important;
        }

        .note-indicator {
            margin-left: auto;
            font-size: 0.85rem;
            opacity: 0.55;
            flex-shrink: 0;
            cursor: pointer;
        }

        /* --- ADD TASK INPUT --- */
        .add-task-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            align-items: center;
        }
        .add-task-input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px dashed var(--accent-tan);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-main);
            background: #fff;
            outline: none;
            transition: border-color 0.15s;
        }
        .add-task-input:focus { border-color: var(--highlight-focus); border-style: solid; }
        .add-task-input::placeholder { color: var(--text-muted); }
        .add-task-btn {
            padding: 12px 20px;
            background: var(--text-main);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s;
            white-space: nowrap;
        }
        .add-task-btn:hover { opacity: 0.8; }
        .custom-task-delete {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0 4px;
            transition: color 0.15s;
            flex-shrink: 0;
        }
        .custom-task-delete:hover { color: #b85c5c; }

        /* --- CALENDAR --- */
        .cal-filter-btn {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--accent-line);
            background: #fff;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-main);
        }
        .cal-filter-btn.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }
        .cal-day-cell {
            min-height: 80px;
            background: #fff;
            border-radius: 10px;
            border: 1px solid var(--accent-line);
            padding: 6px;
            font-size: 0.75rem;
            position: relative;
        }
        .cal-day-cell.today { border: 2px solid var(--text-main); }
        .cal-day-cell.other-month { opacity: 0.35; }
        .cal-day-num { font-weight: 800; font-size: 0.85rem; margin-bottom: 4px; }
        .cal-dot {
            border-radius: 4px;
            padding: 2px 5px;
            margin-bottom: 2px;
            font-size: 0.7rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: default;
        }
        .cal-dot-recurring { background: #7b9e87; }
        .cal-dot-school    { background: #7a86c8; }
        .cal-dot-business  { background: #c8a87a; }
        .cal-dot-misc      { background: #c87a7a; }
    </style>
</head>
<body>

    <!-- Loading screen: shown while data is being fetched from the cloud -->
    <div id="cloud-load-screen" style="position:fixed; inset:0; background:#f6e6e2; z-index:999999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
        <div style="width:42px; height:42px; border:4px solid #eae3df; border-top-color:#dca391; border-radius:50%; animation:cloud-spin 0.8s linear infinite;"></div>
        <div style="color:#968685; font-size:0.9rem; letter-spacing:1px; text-transform:uppercase; font-weight:700;">Loading your data…</div>
    </div>
    <style>@keyframes cloud-spin { to { transform: rotate(360deg); } }</style>

    <!-- Small "Saving…" / "Saved" indicator, fades in/out automatically -->
    <div id="sync-status" style="position:fixed; bottom:16px; right:20px; z-index:99998; font-size:0.78rem; font-weight:700; letter-spacing:0.5px; color:#968685; opacity:0; transition:opacity 0.4s ease; pointer-events:none;"></div>

    <canvas id="confetti-canvas"></canvas>

    <!-- Right-click context menu -->
    <div id="task-context-menu">
        <div class="context-menu-item" id="ctx-add-note">📝 Add Note</div>
        <div class="context-menu-item" id="ctx-due-date" style="display:none;">📆 Set Due Date</div>
        <div class="context-menu-item" id="ctx-reschedule" style="display:none;">📅 Reschedule</div>
        <div class="context-menu-item danger" id="ctx-remove-note" style="display:none;">🗑 Remove Note</div>
    </div>

    <!-- Reschedule date picker modal -->
    <div id="reschedule-modal-overlay" onclick="if(event.target===this)this.style.display='none'" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:none;justify-content:center;align-items:center;background:rgba(74,62,61,0.35);backdrop-filter:blur(4px);">
        <div onclick="event.stopPropagation()" style="background:var(--card-bg);border-radius:var(--border-radius);padding:30px;max-width:380px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.15);animation:modalFadeIn 0.2s ease forwards;">
            <div style="font-size:0.85rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:6px;">Reschedule Task</div>
            <div id="reschedule-task-label" style="font-size:1rem;font-weight:700;color:var(--text-main);margin-bottom:18px;"></div>
            <input type="date" id="reschedule-date-input" style="width:100%;padding:12px 14px;border:1.5px solid var(--accent-line);border-radius:12px;font-size:1rem;font-family:inherit;color:var(--text-main);background:#fff;outline:none;box-sizing:border-box;">
            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;">
                <button class="note-btn note-btn-cancel" onclick="document.getElementById('reschedule-modal-overlay').style.display='none'">Cancel</button>
                <button class="note-btn note-btn-save" onclick="saveReschedule()">Save Date</button>
            </div>
        </div>
    </div>

    <!-- Floating Calendar Button -->
    <button id="calendar-fab" onclick="openCalendar()" title="Open Calendar" style="position:fixed;bottom:28px;right:28px;z-index:9000;width:56px;height:56px;border-radius:50%;background:var(--text-main);color:#fff;border:none;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:transform 0.15s,opacity 0.15s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">📅</button>

    <!-- Due Date & Reminder Modal -->
    <div id="due-modal-overlay" onclick="if(event.target===this)closeDueModal()" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;display:none;justify-content:center;align-items:center;background:rgba(74,62,61,0.35);backdrop-filter:blur(4px);">
        <div onclick="event.stopPropagation()" style="background:var(--card-bg);border-radius:var(--border-radius);padding:30px;max-width:460px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.15);animation:modalFadeIn 0.2s ease forwards;">
            <div style="font-size:0.85rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);margin-bottom:6px;">Due Date & Reminders</div>
            <div id="due-modal-label" style="font-size:1rem;font-weight:700;color:var(--text-main);margin-bottom:18px;"></div>
            <label style="font-size:0.85rem;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;">Due Date</label>
            <input type="date" id="due-date-input" style="width:100%;padding:11px 14px;border:1.5px solid var(--accent-line);border-radius:12px;font-size:1rem;font-family:inherit;color:var(--text-main);background:#fff;outline:none;box-sizing:border-box;margin-top:6px;margin-bottom:18px;">
            <label style="font-size:0.85rem;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;">Reminders</label>
            <div style="margin-top:8px;margin-bottom:6px;display:flex;flex-direction:column;gap:8px;" id="reminder-list"></div>
            <button onclick="addReminderRow()" style="background:none;border:1.5px dashed var(--accent-tan);border-radius:10px;padding:8px 16px;font-size:0.9rem;font-weight:700;color:var(--accent-tan);cursor:pointer;width:100%;margin-bottom:18px;">+ Add Reminder</button>
            <div style="display:flex;justify-content:flex-end;gap:10px;">

    <script>
        // ==========================================================
        // CLOUD SYNC SHIM
        // Replaces the browser's localStorage with a version backed
        // by window.storage, so checking something off on your phone
        // shows up on your computer too. Everything below this block
        // still calls `localStorage.getItem/setItem/removeItem` like
        // normal -- nothing else in the file needed to change.
        // ==========================================================
        const _cache = {};       // in-memory mirror, kept in sync with the cloud
        let _ready = false;      // becomes true once the initial cloud load finishes
        let _pendingSaves = {};  // keys that need to be written to cloud
        let _saveTimer = null;

        // Storage key encoding: we prefix each stored value with the original key
        // (URL-encoded) and a null byte delimiter, so we can recover the exact
        // original key name on load regardless of the storage key sanitization.
        function _encodeValue(originalKey, value) {
            return encodeURIComponent(originalKey) + '\x00' + value;
        }
        function _decodeValue(encoded) {
            const sep = encoded.indexOf('\x00');
            if (sep === -1) return { key: null, value: encoded }; // legacy fallback
            return { key: decodeURIComponent(encoded.substring(0, sep)), value: encoded.substring(sep + 1) };
        }
        function _toStorageKey(key) {
            // Sanitize to allowed chars; max 180 chars leaving room for 'dash-' prefix
            return 'dash-' + key.replace(/[^a-zA-Z0-9\-]/g, '_').substring(0, 180);
        }

        async function _flushSaves() {
            const keys = Object.keys(_pendingSaves);
            _pendingSaves = {};
            let anyFailed = false;
            for (const key of keys) {
                const storageKey = _toStorageKey(key);
                try {
                    if (!Object.prototype.hasOwnProperty.call(_cache, key)) {
                        await window.storage.delete(storageKey, false);
                    } else {
                        await window.storage.set(storageKey, _encodeValue(key, _cache[key]), false);
                    }
                } catch (e) {
                    console.error('Cloud save failed for key', key, e);
                    anyFailed = true;
                }
            }
            showSyncStatus(anyFailed ? 'Save failed — will retry' : 'Saved ✓', anyFailed);
        }

        function _scheduleSave(key) {
            _pendingSaves[key] = true;
            clearTimeout(_saveTimer);
            _saveTimer = setTimeout(_flushSaves, 400);
        }

        function showSyncStatus(text, isError) {
            const el = document.getElementById('sync-status');
            if (!el) return;
            el.innerText = text;
            el.style.color = isError ? '#c0392b' : 'var(--success-green)';
            el.style.opacity = '1';
            clearTimeout(el._fadeTimer);
            el._fadeTimer = setTimeout(() => { el.style.opacity = '0'; }, 2000);
        }

        const localStorage = {
            getItem(key) {
                return Object.prototype.hasOwnProperty.call(_cache, key) ? _cache[key] : null;
            },
            setItem(key, value) {
                const str = String(value);
                if (_cache[key] === str) return; // no-op if unchanged
                _cache[key] = str;
                if (_ready) { _scheduleSave(key); showSyncStatus('Saving…'); }
            },
            removeItem(key) {
                if (!Object.prototype.hasOwnProperty.call(_cache, key)) return;
                delete _cache[key];
                if (_ready) { _scheduleSave(key); showSyncStatus('Saving…'); }
            }
        };

        async function _loadFromCloud() {
            try {
                const listing = await window.storage.list('dash-', false);
                if (listing && listing.keys && listing.keys.length > 0) {
                    await Promise.all(listing.keys.map(async (storageKey) => {
                        try {
                            const result = await window.storage.get(storageKey, false);
                            if (result && result.value) {
                                const { key, value } = _decodeValue(result.value);
                                if (key) _cache[key] = value;
                            }
                        } catch (e) { /* skip individual bad keys */ }
                    }));
                }
            } catch (e) {
                console.log('Cloud load skipped:', e && e.message);
            }
            _ready = true;
        }
        // ==========================================================
        // END CLOUD SYNC SHIM
        // ==========================================================

        // --- 1. REAL-TIME CALENDAR CALCULATION ENGINE ---
        const today = new Date();
        const currentDayIndex = today.getDay(); 
        const currentMonthName = today.toLocaleDateString('en-US', { month: 'long' });
        const currentYearNum = today.getFullYear();
        
        const calculatedDateStart = new Date(today.getFullYear(), today.getMonth(), 1);
        const currentWeekOfMonthIndex = Math.ceil((((today - calculatedDateStart) / 86400000) + calculatedDateStart.getDay() + 1) / 7);
        const calculatedQuarterIndex = Math.floor((today.getMonth() / 3)) + 1;

        let activeRealtimeSeason = "Spring";
        const runningMonthRawNum = today.getMonth() + 1;
        if (runningMonthRawNum >= 6 && runningMonthRawNum <= 8) activeRealtimeSeason = "Summer";
        else if (runningMonthRawNum >= 9 && runningMonthRawNum <= 11) activeRealtimeSeason = "Fall";
        else if (runningMonthRawNum === 12 || runningMonthRawNum <= 2) activeRealtimeSeason = "Winter";

        // Year-suffixed scope keys — used by both the scheduler and the renderers
        // so they always refer to the same storage IDs. Adding the year means
        // tasks automatically reset when the new year/period starts.
        const _yr = currentYearNum;
        const _halfScope = today.getMonth() < 6 ? 'semiannual-h1-' + _yr : 'semiannual-h2-' + _yr;
        const _seasonScope = 'seasonal-' + activeRealtimeSeason.toLowerCase() + '-' + _yr;
        const _annualScope = 'annually-' + _yr;
        const _quarterScope = (q) => 'quarterly-q' + q + '-' + _yr;

        document.getElementById('date-string').innerText = today.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
        document.getElementById('day-string').innerText = today.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();

        // --- 2. MASTER TASK DEFINITIONS FROM DOCUMENT ---
        const dailyHabitsDivided = {
            morning: ["Make the bed", "Unload dishwasher", "Clean kitchen after breakfast"],
            afternoon: ["Check mail"],
            evening: [
                "Wipe down kitchen counters, island surfaces and dining table", 
                "Quick sweep", 
                "Clear open surfaces of clutter, return items to designated spots", 
                "Take out trash", 
                "Check door locks", 
                "Clear kitchen/dining table"
            ]
        };

        const baseWeeklyHabits = {
            1: ["Clear kitchen surfaces", "Wipe kitchen surfaces", "Clean bathroom surfaces", "Quick tidy of living room", "Entryway cleanup", "Sweep walkways", "Wipe appliance exteriors", "Wipe dining table + chairs"], // MONDAY
            2: [ // TUESDAY — Laundry + bedding
                "Collect & wash clothes", "Dry clothes", "Fold & put away clothes",
                "Wash & change bedding", "Wipe fabric headboard",
                "Wipe laundry room shelves", "Sweep laundry room floor", "Mop laundry room floor", "Wipe washer & dryer exterior", "Wipe laundry room walls & backsplash"
            ],
            3: [ // WEDNESDAY — Second room + tech
                "Clean stovetop & microwave", "Organize one small drawer/area", "Light living room cleanup",
                "Deep clean microwave interior", "Clean TV", "Clean Laptops & Monitors", "Clean Phones",
                "Wipe vanity surface", "Wipe vanity mirror", "Organize makeup & hair products", "Wipe vanity drawers front",
                "Clear & wipe desk surface", "Organize desk items & cables", "Dust monitor & peripherals",
                "Clau's closet — sweep floor", "Clau's closet — mop vinyl floor", "Clau's closet — tidy hanging items", "Clau's closet — wipe shelves"
            ],
            4: ["Clean toilets", "Clean sinks & faucets", "Wipe mirrors", "Scrub shower/tub", "Sweep/mop bathroom floors", "Thorough wipe of bathroom counters"], // THURSDAY — Both bathrooms
            5: ["Sweep living area", "Mop Living Room", "Quick car cleanup", "Dust living room surfaces", "Wipe light switches", "Wipe door handles"], // FRIDAY
            6: [ // SATURDAY — Main bedroom + kitchen
                "Clear out fridge", "Meal plan", "Grocery shop", "Tidy pantry", "Meal prep", "Sweep/mop kitchen floor", "Wipe kitchen cabinet fronts", "Wipe fridge handles & exterior",
                "Clean & declutter nightstands", "Clean dresser", "Quick vacuum bedroom floors",
                "Wyatt's closet — sweep floor", "Wyatt's closet — mop vinyl floor", "Wyatt's closet — tidy hanging items", "Wyatt's closet — wipe shelves"
            ],
            0: ["Refresh living room", "Quick balcony sweep", "Wipe balcony railing", "Do Budget"] // SUNDAY
        };

        const monthlyTasks = [
            "Check smoke alarms", "Inspect fire extinguisher", "Wipe air vents", 
            "Clean mineral deposits from faucets/showerheads", "Inspect drain traps", "Vacuum dryer vent", 
            "Clean refrigerator coils", "Clean oven interior", "Clean dishwasher filter", "Clean washing machine", 
            "Clean inside trash cans", "Dust baseboards", "Vacuum under movable furniture", "Clean under couch cushions", 
            "Wipe ceiling fan blades", "Car wash",
            "Sweep coat closet floor", "Declutter & organize coats & shoes", "Wipe coat closet shelf",
            "Sweep guest bathroom closet floor", "Mop guest bathroom closet floor", "Declutter & organize guest bathroom closet", "Wipe guest bathroom closet shelves"
        ];

        const quarterlyTasks = [
            "Wash windows & blinds", "Declutter one major area", "Rotate mattress", "Deep clean balcony", 
            "Wash shower curtain & bath mats", "Clean behind washer/dryer", "Clean inside kitchen drawers", 
            "Clean inside bathroom drawers", "Clean window tracks", "Clean patio door tracks", 
            "Deep clean ceiling fans", "Clean behind fridge", "Clean behind stove", "Wash throw pillows"
        ];

        const semiAnnualTasks = [
            "Deep clean couch with Green Machine"
        ];

        const seasonalTasks = {
            "Spring": ["Clean balcony closet", "Clean exhaust fan outlets", "Check weatherstripping"],
            "Summer": ["Inspect for pests", "Deep clean dishwasher", "Reverse ceiling fans counterclockwise"],
            "Fall": [], 
            "Winter": ["Reverse ceiling fans clockwise", "Inspect shower/tub surrounds"]
        };

        const annualTasks = [
            "Wash exterior windows", "Wash walls in hightouch areas", "Replace smoke detector batteries"
        ];

        // Specific focused lists derived from standard rotations
        const carTasks = ["Quick car cleanup", "Car wash"];
        const businessTasks = [];
        const miscTasks = [];

        const sectionsMapping = {
            'daily': 'Daily Focus',
            'weekly': 'Weekly Tasks',
            'monthly': 'Monthly Tasks',
            'quarterly': 'Quarterly Tasks',
            'semi-annually': 'Semi-Annual Tasks',
            'seasonal': 'Seasonal Tasks',
            'annually': 'Annual Tasks',
            'school': 'School',
            'business': 'Business',
            'misc': 'Misc'
        };

        // --- 3. SMART SCHEDULER ENGINE ---
        // Returns all weekend dates (Sat/Sun weighted) in a date range
        function getWeekendDates(start, end) {
            const dates = [], d = new Date(start);
            while (d <= end) {
                if (d.getDay() === 6 || d.getDay() === 0) dates.push(new Date(d));
                d.setDate(d.getDate() + 1);
            }
            return dates;
        }

        // Returns all dates (weekdays too) in a range, but weekends weighted 3x
        function getWeightedDates(start, end) {
            const dates = [], d = new Date(start);
            while (d <= end) {
                const isWeekend = d.getDay() === 6 || d.getDay() === 0;
                for (let i = 0; i < (isWeekend ? 3 : 1); i++) dates.push(new Date(d));
                d.setDate(d.getDate() + 1);
            }
            return dates;
        }

        function pickRandomDate(dates) {
            return dates[Math.floor(Math.random() * dates.length)];
        }

        function dateKey(d) {
            return d.toISOString().split('T')[0]; // YYYY-MM-DD
        }

        function todayKey() { return dateKey(today); }

        // Returns the next upcoming weekend date from today
        function nextWeekendDate() {
            const d = new Date(today);
            d.setDate(d.getDate() + 1);
            while (d.getDay() !== 6 && d.getDay() !== 0) d.setDate(d.getDate() + 1);
            return dateKey(d);
        }

        function nextAvailableDate(task) {
            if (weekendOnlyTasks.has(task)) return nextWeekendDate();
            // any-day: just tomorrow
            const d = new Date(today);
            d.setDate(d.getDate() + 1);
            return dateKey(d);
        }

        // Assign initial date or auto-reschedule if overdue and not manually set
        function assignOrReschedule(baseId, fallbackDates, task) {
            const scheduledKey = baseId + '-scheduled';
            const manualKey = baseId + '-manual';
            const scheduled = localStorage.getItem(scheduledKey);
            const isManual = localStorage.getItem(manualKey) === 'true';
            const isDone = localStorage.getItem(baseId) === 'true';

            if (!scheduled) {
                localStorage.setItem(scheduledKey, dateKey(pickRandomDate(fallbackDates)));
            } else if (!isDone && !isManual && scheduled < todayKey()) {
                localStorage.setItem(scheduledKey, nextAvailableDate(task));
                localStorage.setItem(baseId + '-rescheduled', 'true');
            }
        }

        // Tasks that must land on a weekend
        const weekendOnlyTasks = new Set([
            // Monthly
            "Vacuum dryer vent", "Clean refrigerator coils", "Clean oven interior",
            "Dust baseboards", "Vacuum under movable furniture", "Car wash",
            // Quarterly
            "Wash windows & blinds", "Declutter one major area", "Rotate mattress",
            "Deep clean balcony", "Wash shower curtain & bath mats", "Clean behind washer/dryer",
            "Clean inside kitchen drawers", "Clean inside bathroom drawers",
            "Deep clean ceiling fans", "Clean behind fridge", "Clean behind stove", "Wash throw pillows",
            // Semi-annually
            "Deep clean couch with Green Machine",
            // Seasonal
            "Clean balcony closet", "Deep clean dishwasher",
            // Annually
            "Wash exterior windows", "Wash walls in hightouch areas",
            // Monthly closets — any day (quick tasks, no weekend needed)
        ]);

        function poolFor(task, allDates, weekendDates) {
            return weekendOnlyTasks.has(task) ? weekendDates : allDates;
        }

        function buildSchedule() {
            const year = today.getFullYear();
            const month = today.getMonth();

            // MONTHLY
            const monthStart = new Date(year, month, 1);
            const monthEnd = new Date(year, month + 1, 0);
            const monthAll = getWeightedDates(monthStart, monthEnd);
            const monthWE = getWeekendDates(monthStart, monthEnd);
            monthlyTasks.forEach(task => {
                assignOrReschedule(generateActiveId(task, '', 'monthly'), poolFor(task, monthAll, monthWE), task);
            });

            // QUARTERLY
            const qStart = new Date(year, Math.floor(month / 3) * 3, 1);
            const qEnd = new Date(year, Math.floor(month / 3) * 3 + 3, 0);
            const qAll = getWeightedDates(qStart, qEnd);
            const qWE = getWeekendDates(qStart, qEnd);
            quarterlyTasks.forEach(task => {
                assignOrReschedule(generateActiveId(task, '', _quarterScope(calculatedQuarterIndex)), poolFor(task, qAll, qWE), task);
            });

            // SEMI-ANNUALLY
            const halfStart = month < 6 ? new Date(year, 0, 1) : new Date(year, 6, 1);
            const halfEnd = month < 6 ? new Date(year, 5, 30) : new Date(year, 11, 31);
            const halfAll = getWeightedDates(halfStart, halfEnd);
            const halfWE = getWeekendDates(halfStart, halfEnd);
            semiAnnualTasks.forEach(task => {
                assignOrReschedule(generateActiveId(task, '', _halfScope), poolFor(task, halfAll, halfWE), task);
            });

            // SEASONAL
            const seasonMonths = { 'Spring': [2,3,4], 'Summer': [5,6,7], 'Fall': [8,9,10], 'Winter': [11,0,1] };
            const sMons = seasonMonths[activeRealtimeSeason];
            const seasonStart = new Date(year, sMons[0], 1);
            const seasonEnd = new Date(year, sMons[2] + 1, 0);
            const seasonAll = getWeightedDates(seasonStart, seasonEnd);
            const seasonWE = getWeekendDates(seasonStart, seasonEnd);
            (seasonalTasks[activeRealtimeSeason] || []).forEach(task => {
                assignOrReschedule(generateActiveId(task, '', _seasonScope), poolFor(task, seasonAll, seasonWE), task);
            });

            // ANNUALLY
            const yearStart = new Date(year, 0, 1);
            const yearEnd = new Date(year, 11, 31);
            const yearAll = getWeightedDates(yearStart, yearEnd);

        // --- 3. DYNAMIC SCHEDULE GENERATION FOR JULY 2026 ---
        function generateMonthSlices(year, monthIndex) {
            const slices = [];
            let currentWeekNum = 1;
            let startOfSlice = new Date(year, monthIndex, 1);
            const totalDaysInMonth = new Date(year, monthIndex + 1, 0).getDate();

            for (let day = 2; day <= totalDaysInMonth; day++) {
                let checkDate = new Date(year, monthIndex, day);
                if (checkDate.getDay() === 1) { // Break on Mondays
                    slices.push({
                        weekNumber: currentWeekNum,
                        start: new Date(startOfSlice),
                        end: new Date(year, monthIndex, day - 1)
                    });
                    currentWeekNum++;
                    startOfSlice = new Date(checkDate);
                }
            }
            slices.push({
                weekNumber: currentWeekNum,
                start: new Date(startOfSlice),
                end: new Date(year, monthIndex, totalDaysInMonth)
            });
            return slices;
        }

        function buildJuly2026Schedule() {
            const slices = generateMonthSlices(2026, 6); // July 2026
            
            // Distribute items logically throughout the month segments
            const monthlyTaskAssignments = {

                4: ["Clean inside trash cans", "Dust baseboards", "Vacuum under movable furniture"],
                5: ["Clean under couch cushions", "Wipe ceiling fan blades", "Car wash"]
            };

            return slices.map(slice => {
                const recurringHabitItems = [];
                let loopDate = new Date(slice.start);
                while (loopDate <= slice.end) {
                    let dayOfWeek = loopDate.getDay();
                    let dayLabel = loopDate.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase();
                    let dateLabel = loopDate.getDate();
                    
                    let dayHabits = baseWeeklyHabits[dayOfWeek] || [];
                    dayHabits.forEach(h => {

                            task: h,
                            meta: `${dayLabel} ${dateLabel}`,
                            idScope: `weekly-cycle-${dayLabel.toLowerCase()}-${dateLabel}`
                        });
                    });
                    loopDate.setDate(loopDate.getDate() + 1);
                }

                const monthlyInjections = (monthlyTaskAssignments[slice.weekNumber] || []).map(t => {
                    return {
                        task: t,
                        meta: `Monthly Checklist`,
                        idScope: `monthly-injection`
                    };
                });

                return {
                    weekNumber: slice.weekNumber,
                    dateRangeString: `${slice.start.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${slice.end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`,
                    allTasks: [...monthlyInjections, ...recurringHabitItems]
                };
            });
        }

        // Returns a string like "w2026-28" — unique per calendar week.
        // Used to namespace daily/weekly task IDs so they reset each new week

        function getWeekKey() {
            const d = new Date(today);
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + 4 - (d.getDay() || 7)); // ISO week: Thursday anchor
            const yearStart = new Date(d.getFullYear(), 0, 1);
            const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return 'w' + d.getFullYear() + '-' + week;
        }
        const _weekKey = getWeekKey(); // compute once, reuse everywhere

            const color = diff < 0 ? '#c87a7a' : diff <= 3 ? '#c8a87a' : 'var(--text-muted)';
            const prefix = diff < 0 ? '⚠ Overdue' : diff === 0 ? '🔴 Due Today' : `📆 Due ${label}`;
            return `<span style="font-size:0.78rem;font-weight:700;color:${color};margin-left:8px;">${prefix}</span>`;
        }

        function addSection(scope) {
            const input = document.getElementById('new-section-input-' + scope);
            const text = input.value.trim();
            if (!text) return;
            const data = getSectionData(scope);
            data.push({ type: 'section', text });
            saveSectionData(scope, data);
            switchView(scope);
        }

        function addSectionedTask(scope) {
            const input = document.getElementById('new-task-input-' + scope);
            const text = input.value.trim();
            if (!text) return;
            const picker = document.getElementById('section-picker-' + scope);
            const pickedVal = picker ? picker.value : '__end__';
            const data = getSectionData(scope);

            if (pickedVal === '__end__') {
                data.push({ type: 'task', text });
            } else {
                // Find the nth section and insert task after it (before next section or end)
                const sectionNum = parseInt(pickedVal);
                let count = -1, insertIdx = data.length;
                for (let i = 0; i < data.length; i++) {
                    if (data[i].type === 'section') {
                        count++;
                        if (count === sectionNum) {
                            // Find end of this section
                            let end = i + 1;
                            while (end < data.length && data[end].type !== 'section') end++;
                            insertIdx = end;
                            break;
                        }
                    }
                }
                data.splice(insertIdx, 0, { type: 'task', text });
            }
            saveSectionData(scope, data);
            switchView(scope);
        }

        function addCustomTask(scope) {
            const input = document.getElementById('new-task-input-' + scope);
            const text = input.value.trim();
            if (!text) return;
            const tasks = getCustomTasks(scope);
            tasks.push(text);
            saveCustomTasks(scope, tasks);
            switchView(scope);
        }

        function deleteSectionItem(scope, idx) {
            const data = getSectionData(scope);
            if (data[idx].type === 'section') {
                let end = idx + 1;
                while (end < data.length && data[end].type !== 'section') end++;
                data.splice(idx, end - idx);
            } else {
                data.splice(idx, 1);
            }
            saveSectionData(scope, data);
            switchView(scope);
        }

        function deleteCustomTask(scope, idx) {
            const tasks = getCustomTasks(scope);

        function toggleTaskStatusDirectly(id) {
            const checkbox = document.getElementById(id);
            if (!checkbox) return;
            
            const newState = !checkbox.checked;
            checkbox.checked = newState;
            localStorage.setItem(id, newState ? "true" : "false");
            if (newState) {
                localStorage.setItem(id + '-date', new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }));
            } else {
                localStorage.removeItem(id + '-date');
            }

            // Only trigger confetti when checking (not unchecking) and the whole section is done
            if (newState) {
                const parentGroup = checkbox.closest('.todo-group');
                if (parentGroup) {
                    const allCheckboxes = parentGroup.querySelectorAll('input[type="checkbox"]');
                    const allDone = allCheckboxes.length > 0 && [...allCheckboxes].every(cb => cb.checked);
                    if (allDone && typeof triggerConfettiBurst === "function") {
                        triggerConfettiBurst();
                    }
                }
            }

        // --- 6. POP-UP LOG DRILL DOWN ENGINE ---
        function openHistoryPopupEngine(categoryKey) {
            document.getElementById('popup-modal-title').innerText = sectionsMapping[categoryKey] + " Audit Logs";
            const tabsContainer = document.getElementById('popup-interval-tabs-grid');
            const listContainer = document.getElementById('popup-drilldown-items-list');
            
            tabsContainer.innerHTML = '';
            listContainer.innerHTML = '';

            const subIntervals = modalIntervalsMapping[categoryKey] || ["General Pool"];
            subIntervals.forEach((intervalName, idx) => {
                const tab = document.createElement('div');
                tab.className = 'interval-tab' + (idx === 0 ? ' current-focus' : '');
                tab.innerText = intervalName;
                tab.onclick = () => {
                    document.querySelectorAll('.interval-tab').forEach(t => t.classList.remove('current-focus'));
                    tab.classList.add('current-focus');
                    loadPopupItemsList(categoryKey, intervalName);
                };
                tabsContainer.appendChild(tab);
            });

            document.getElementById('history-popup-modal').classList.add('active');
            loadPopupItemsList(categoryKey, subIntervals[0]);
        }

        function loadPopupItemsList(categoryKey, intervalName) {
            const listContainer = document.getElementById('popup-drilldown-items-list');
            let itemsToRender = [];

            if (categoryKey === 'daily') {
                const dayIndexMap = { "Sunday":0, "Monday":1, "Tuesday":2, "Wednesday":3, "Thursday":4, "Friday":5, "Saturday":6 };
                const idx = dayIndexMap[intervalName];
                const daySpecificWeeklyHabits = baseWeeklyHabits[idx] || [];
                daySpecificWeeklyHabits.forEach(t => itemsToRender.push({ text: t, scope: 'weekly' }));
                Object.values(dailyHabitsDivided).flat().forEach(t => itemsToRender.push({ text: t, scope: 'daily' }));
            } else if (categoryKey === 'weekly') {
                const matchWeekNum = parseInt(intervalName.replace("Week ", ""));
                const fullJulySchedule = buildJuly2026Schedule();
                const matchedBlock = fullJulySchedule.find(b => b.weekNumber === matchWeekNum);
                if(matchedBlock) {
                    matchedBlock.allTasks.forEach(item => {
                        itemsToRender.push({ text: item.task, meta: item.meta, scope: 'weekly-schedule' });
                    });
                }
            } else if (categoryKey === 'seasonal') {
                const seasonalList = seasonalTasks[intervalName] || [];
                seasonalList.forEach(t => itemsToRender.push({ text: t, scope: 'seasonal-' + intervalName.toLowerCase() }));
            } else {
                let lookupScope = categoryKey;
                if(categoryKey === 'quarterly') lookupScope = 'quarterly-q1'; // default lookup mock
                
                const standardPool = poolDefinitions[categoryKey] || [];
                standardPool.forEach(t => itemsToRender.push({ text: t, scope: lookupScope }));
            }

            let html = '';
            if(itemsToRender.length === 0) {
                html = '<div style="color: var(--text-muted); font-style: italic;">No specific tasks mapped to this segment window.</div>';
            } else {
                itemsToRender.forEach(item => {
                    const lookupId = generateActiveId(item.text, item.meta, item.scope);
                    const isDone = localStorage.getItem(lookupId) === "true";
                    const noteText = localStorage.getItem(lookupId + '-note') || '';
                    html += `
                        <div class="history-detail-item" style="flex-direction:column; align-items:flex-start; gap:4px;">
                            <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                                <span class="history-detail-text" style="${isDone ? 'text-decoration: line-through; color: var(--text-muted);' : ''}">
                                    ${item.meta ? `<small style="color: var(--highlight-focus); font-weight:700;">${item.meta.toUpperCase()} — </small>` : ''}${item.text}
                                </span>
                                <span class="history-detail-time" style="color: ${isDone ? 'var(--success-green)' : 'var(--highlight-focus)'}; white-space:nowrap; margin-left:12px;">
                                    ${isDone ? (localStorage.getItem(lookupId + '-date') ? '✓ ' + localStorage.getItem(lookupId + '-date') : 'COMPLETED') : 'OPEN'}
                                </span>
                            </div>
                            ${noteText ? `<div style="font-size:0.85rem; color:var(--text-muted); padding: 4px 2px;">📝 ${noteText}</div>` : ''}
                        </div>
                    `;
                });
            }
            listContainer.innerHTML = html;
        }

        // --- 7. CONTEXT MENU & NOTES ENGINE ---
        let _ctxTaskId = null;
        let _ctxTaskLabel = null;
        let _ctxScope = null;

        function openContextMenu(event, taskId, taskLabel, scope) {
            event.preventDefault();
            event.stopPropagation();
            _ctxTaskId = taskId;
            _ctxTaskLabel = taskLabel;
            _ctxScope = scope || '';

            const menu = document.getElementById('task-context-menu');
            const hasNote = !!localStorage.getItem(taskId + '-note');
            const hasSchedule = !!localStorage.getItem(taskId + '-scheduled');
            const isCustomScope = ['school','business','misc'].some(s => _ctxScope.includes(s));
            document.getElementById('ctx-add-note').innerText = hasNote ? '📝 Edit Note' : '📝 Add Note';
            document.getElementById('ctx-remove-note').style.display = hasNote ? 'block' : 'none';
            document.getElementById('ctx-reschedule').style.display = hasSchedule ? 'block' : 'none';
            document.getElementById('ctx-due-date').style.display = isCustomScope ? 'block' : 'none';

            menu.style.display = 'block';
            menu.style.left = event.clientX + 'px';
            menu.style.top = event.clientY + 'px';

            // Keep menu on screen
            requestAnimationFrame(() => {
                const rect = menu.getBoundingClientRect();
                if (rect.right > window.innerWidth) menu.style.left = (event.clientX - rect.width) + 'px';
                if (rect.bottom > window.innerHeight) menu.style.top = (event.clientY - rect.height) + 'px';
            });
        }

        document.getElementById('ctx-reschedule').onclick = () => {
            closeContextMenu();
            openRescheduleModal(_ctxTaskId, _ctxTaskLabel);
        };

        function openRescheduleModal(taskId, taskLabel) {
            const current = localStorage.getItem(taskId + '-scheduled') || todayKey();
            document.getElementById('reschedule-task-label').innerText = taskLabel;
            document.getElementById('reschedule-date-input').value = current;
            document.getElementById('reschedule-modal-overlay').style.display = 'flex';
            _ctxTaskId = taskId;
        }

        function saveReschedule() {
            const newDate = document.getElementById('reschedule-date-input').value;
            if (!newDate || !_ctxTaskId) return;
            localStorage.setItem(_ctxTaskId + '-scheduled', newDate);
            localStorage.setItem(_ctxTaskId + '-manual', 'true');       // mark as manual so auto won't override
            localStorage.removeItem(_ctxTaskId + '-rescheduled');        // clear the auto-rescheduled flag
            document.getElementById('reschedule-modal-overlay').style.display = 'none';
            const activeBtn = document.querySelector('.menu-btn.active');
            if (activeBtn) switchView(activeBtn.id.replace('btn-', ''));
        }

        document.getElementById('ctx-add-note').onclick = () => {
            closeContextMenu();
            openNoteModal(_ctxTaskId, _ctxTaskLabel);
        };

        document.getElementById('ctx-remove-note').onclick = () => {
            if (_ctxTaskId) {
                localStorage.removeItem(_ctxTaskId + '-note');
                closeContextMenu();
                switchView(document.querySelector('.menu-btn.active')?.id.replace('btn-', '') || 'daily');
            }
        };

        function closeContextMenu() {
            document.getElementById('task-context-menu').style.display = 'none';
        }

        document.addEventListener('contextmenu', (e) => {
            if (!e.target.closest('.todo-item')) closeContextMenu();

        function openNoteModal(taskId, taskLabel) {
            document.getElementById('note-modal-task-label').innerText = taskLabel;
            document.getElementById('note-modal-textarea').value = localStorage.getItem(taskId + '-note') || '';
            document.getElementById('note-modal-overlay').classList.add('active');
            setTimeout(() => document.getElementById('note-modal-textarea').focus(), 100);
        }

        function saveNote() {
            const text = document.getElementById('note-modal-textarea').value.trim();
            if (_ctxTaskId) {
                if (text) {
                    localStorage.setItem(_ctxTaskId + '-note', text);
                } else {
                    localStorage.removeItem(_ctxTaskId + '-note');

            closeNoteModalDirect();

            const activeBtn = document.querySelector('.menu-btn.active');
            if (activeBtn) switchView(activeBtn.id.replace('btn-', ''));

            document.getElementById('note-modal-overlay').classList.remove('active');
        }

        function previewNote(taskId, taskLabel) {
            const note = localStorage.getItem(taskId + '-note') || '';
            const preview = document.getElementById('note-preview-popup');

        document.getElementById('ctx-due-date').onclick = () => {
            closeContextMenu();
            openDueModal(_ctxTaskId, _ctxTaskLabel);
        };

        function openDueModal(taskId, taskLabel) {
            _ctxTaskId = taskId;
            document.getElementById('due-modal-label').innerText = taskLabel;
            document.getElementById('due-date-input').value = localStorage.getItem(taskId + '-due') || '';
            // Load existing reminders
            const reminders = JSON.parse(localStorage.getItem(taskId + '-reminders') || '[]');
            document.getElementById('reminder-list').innerHTML = '';
            if (reminders.length === 0) addReminderRow();
            else reminders.forEach(r => addReminderRow(r));
            document.getElementById('due-modal-overlay').style.display = 'flex';
        }

        function closeDueModal() {
            document.getElementById('due-modal-overlay').style.display = 'none';

        function addReminderRow(val) {
            const list = document.getElementById('reminder-list');
            const row = document.createElement('div');
            row.style.cssText = 'display:flex;gap:8px;align-items:center;';
            row.innerHTML = `
                <input type="number" min="0" placeholder="Amount" value="${val ? val.amount : ''}" style="width:80px;padding:9px 12px;border:1.5px solid var(--accent-line);border-radius:10px;font-size:0.95rem;font-family:inherit;outline:none;">
                <select style="flex:1;padding:9px 12px;border:1.5px solid var(--accent-line);border-radius:10px;font-size:0.95rem;font-family:inherit;outline:none;background:#fff;">
                    <option value="minutes" ${val&&val.unit==='minutes'?'selected':''}>minutes before</option>
                    <option value="hours" ${val&&val.unit==='hours'?'selected':''}>hours before</option>
                    <option value="days" ${val&&val.unit==='days'?'selected':''}>days before</option>
                </select>
                <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#c87a7a;font-size:1.1rem;cursor:pointer;flex-shrink:0;">✕</button>
            `;
            list.appendChild(row);
        }

        function saveDueDate() {
            const due = document.getElementById('due-date-input').value;
            if (!due || !_ctxTaskId) return;
            localStorage.setItem(_ctxTaskId + '-due', due);
            // Collect reminders
            const rows = document.getElementById('reminder-list').children;
            const reminders = [];
            for (const row of rows) {
                const amount = row.querySelector('input[type="number"]').value;
                const unit = row.querySelector('select').value;
                if (amount) reminders.push({ amount: parseInt(amount), unit });
            }
            localStorage.setItem(_ctxTaskId + '-reminders', JSON.stringify(reminders));
            closeDueModal();
            scheduleReminders(_ctxTaskId, due, reminders);
            const activeBtn = document.querySelector('.menu-btn.active');
            if (activeBtn) switchView(activeBtn.id.replace('btn-', ''));
        }

        // Schedule in-app reminder checks
        const _reminderTimers = {};
        function scheduleReminders(taskId, dueDate, reminders) {
            // Clear existing timers for this task
            (_reminderTimers[taskId] || []).forEach(t => clearTimeout(t));
            _reminderTimers[taskId] = [];
            const dueMs = new Date(dueDate + 'T09:00:00').getTime();
            reminders.forEach(r => {
                const units = { minutes: 60000, hours: 3600000, days: 86400000 };
                const fireAt = dueMs - r.amount * (units[r.unit] || 86400000);
                const delay = fireAt - Date.now();
                if (delay > 0) {
                    const t = setTimeout(() => showReminderToast(taskId, r), delay);
                    _reminderTimers[taskId].push(t);
                }
            });
        }

        function showReminderToast(taskId, reminder) {
            if (localStorage.getItem(taskId) === 'true') return; // already done
            const label = localStorage.getItem(taskId + '-label') || taskId;
            document.getElementById('reminder-toast-text').innerText = label;
            document.getElementById('reminder-toast-sub').innerText = `Due in ${reminder.amount} ${reminder.unit}`;
            const toast = document.getElementById('reminder-toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 8000);
        }

        // Re-schedule all reminders on page load
        function reloadAllReminders() {
            ['school','business','misc'].forEach(scope => {
                getCustomTasks(scope).forEach(task => {
                    const id = generateActiveId(task, '', scope + '-custom');
                    const due = localStorage.getItem(id + '-due');
                    const reminders = JSON.parse(localStorage.getItem(id + '-reminders') || '[]');
                    if (due && reminders.length) scheduleReminders(id, due, reminders);
                });
            });
        }
        // NOTE: reloadAllReminders() is now called from _initApp() below,
        // after cloud data has finished loading, instead of running here immediately.

        // --- 9. CALENDAR ENGINE ---
        let _calYear = today.getFullYear();
        let _calMonth = today.getMonth();
        let _calFilter = 'all';

        const CAL_COLORS = { recurring: '#7b9e87', school: '#7a86c8', business: '#c8a87a', misc: '#c87a7a' };

        function openCalendar() {
            _calYear = today.getFullYear();
            _calMonth = today.getMonth();
            renderCalendar();
            document.getElementById('calendar-modal-overlay').style.display = 'flex';
        }

        function closeCalendar() {
            document.getElementById('calendar-modal-overlay').style.display = 'none';
        }

        function changeCalMonth(dir) {
            _calMonth += dir;
            if (_calMonth > 11) { _calMonth = 0; _calYear++; }
            if (_calMonth < 0) { _calMonth = 11; _calYear--; }
            renderCalendar();
        }

        function setCalFilter(filter, btn) {
            _calFilter = filter;
            document.querySelectorAll('.cal-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCalendar();
        }

        function getCalendarEvents() {
            const events = {}; // { 'YYYY-MM-DD': [{label, type}] }
            function addEvent(dateKey, label, type) {
                if (!events[dateKey]) events[dateKey] = [];
                events[dateKey].push({ label, type });
            }

            if (_calFilter === 'all' || _calFilter === 'recurring') {
                // Recurring scheduled tasks
                const allRecurring = [
                    ...monthlyTasks.map(t => ({ t, scope: 'monthly' })),
                    ...quarterlyTasks.map(t => ({ t, scope: _quarterScope(calculatedQuarterIndex) })),
                    ...semiAnnualTasks.map(t => ({ t, scope: _halfScope })),
                    ...(seasonalTasks[activeRealtimeSeason] || []).map(t => ({ t, scope: _seasonScope })),
                    ...annualTasks.map(t => ({ t, scope: _annualScope })),
                ];
                allRecurring.forEach(({ t, scope }) => {
                    const id = generateActiveId(t, '', scope);
                    const d = localStorage.getItem(id + '-scheduled');
                    if (d) addEvent(d, t, 'recurring');
                });
            }

            ['school','business','misc'].forEach(scope => {
                if (_calFilter !== 'all' && _calFilter !== scope) return;
                getCustomTasks(scope).forEach(task => {
                    const id = generateActiveId(task, '', scope + '-custom');
                    const due = localStorage.getItem(id + '-due');
                    if (due) addEvent(due, task, scope);
                });
            });

            return events;
        }

        function renderCalendar() {
            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            document.getElementById('cal-month-label').innerText = `${monthNames[_calMonth]} ${_calYear}`;

            const events = getCalendarEvents();
            const firstDay = new Date(_calYear, _calMonth, 1).getDay();
            const daysInMonth = new Date(_calYear, _calMonth + 1, 0).getDate();
            const daysInPrev = new Date(_calYear, _calMonth, 0).getDate();
            const todayStr = dateKey(today);

            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';

            // Day headers
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
                const h = document.createElement('div');
                h.style.cssText = 'text-align:center;font-size:0.75rem;font-weight:800;color:var(--text-muted);padding:4px 0;letter-spacing:1px;';
                h.innerText = d;
                grid.appendChild(h);
            });

            // Previous month cells
            for (let i = firstDay - 1; i >= 0; i--) {
                const cell = document.createElement('div');
                cell.className = 'cal-day-cell other-month';
                cell.innerHTML = `<div class="cal-day-num">${daysInPrev - i}</div>`;
                grid.appendChild(cell);
            }

            // Current month cells
            for (let d = 1; d <= daysInMonth; d++) {
                const dk = `${_calYear}-${String(_calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'cal-day-cell' + (dk === todayStr ? ' today' : '');
                let inner = `<div class="cal-day-num">${d}</div>`;
                const dayEvents = events[dk] || [];
                dayEvents.slice(0, 3).forEach(ev => {
                    inner += `<div class="cal-dot cal-dot-${ev.type}" title="${ev.label}">${ev.label}</div>`;
                });
                if (dayEvents.length > 3) inner += `<div style="font-size:0.68rem;color:var(--text-muted);font-weight:700;">+${dayEvents.length - 3} more</div>`;
                cell.innerHTML = inner;
                grid.appendChild(cell);
            }

            // Fill remaining cells
            const total = firstDay + daysInMonth;
            const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
            for (let i = 1; i <= remaining; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-day-cell other-month';
                cell.innerHTML = `<div class="cal-day-num">${i}</div>`;
                grid.appendChild(cell);
            }
        }

        // --- 10. CONFETTI EFFECT ENGINE ---
        const canvas = document.getElementById("confetti-canvas");
        const ctx = canvas.getContext("2d");
        let confettiArray = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        class ConfettiParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 6 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = Math.random() * 2 - 1;
                this.color = ["#dbbeaf", "#dca391", "#6e8b75", "#4a3e3d", "#eae3df"][Math.floor(Math.random() * 5)];
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate((this.rotation * Math.PI) / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function triggerConfettiBurst() {
            confettiArray = [];
            for (let i = 0; i < 75; i++) {
                confettiArray.push(new ConfettiParticle());
            }
        }

        function animateConfettiLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettiArray.forEach((p, idx) => {
                p.update();
                p.draw();
                if (p.y > canvas.height) confettiArray.splice(idx, 1);
            });
            requestAnimationFrame(animateConfettiLoop);
        }
        animateConfettiLoop();

        // Auto initialization view
        async function _initApp() {
            try {
                await _loadFromCloud();              // wait for saved checkmarks/notes/etc. to arrive
                runMigrationAndBuildSchedule();      // now safe to read/write localStorage-backed schedule data
                reloadAllReminders();                // now safe to read due-dates/reminders from the cache
                switchView('daily');                 // now safe to render -- cache is populated
                const screen = document.getElementById('cloud-load-screen');
                if (screen) screen.style.display = 'none';
            } catch (err) {
                console.error('Dashboard failed to initialize:', err);
                const screen = document.getElementById('cloud-load-screen');
                if (screen) {
                    screen.innerHTML = `
                        <div style="max-width:480px; text-align:center; padding:20px;">
                            <div style="font-size:0.9rem; letter-spacing:1px; text-transform:uppercase; font-weight:700; color:#c0392b; margin-bottom:10px;">Something went wrong loading the dashboard</div>
                            <div style="font-size:0.85rem; color:#968685; font-family:monospace; word-break:break-word; background:#fff; padding:12px; border-radius:8px;">${(err && err.message) || err}</div>
                        </div>
                    `;
                }
            }
        }
        _initApp();
    </script>
</body>
